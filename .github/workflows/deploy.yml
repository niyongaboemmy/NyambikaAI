name: Build and Deploy Artifacts to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 1. BUILD BACKEND
      - name: Build Backend
        working-directory: ./backend
        run: |
          npm install
          npm run build

      # 2. BUILD FRONTEND
      - name: Build Frontend
        working-directory: ./frontend
        run: |
          # Build NEXT_PUBLIC_* into the bundle at compile time
          cat > .env.production <<EOF
          NEXT_PUBLIC_API_BASE_URL=https://api.nyambika.com
          NEXT_PUBLIC_FILE_SERVER_URL=https://cdn.nyambika.com
          NEXT_PUBLIC_SITE_URL=https://nyambika.com
          NEXT_PUBLIC_CONTACT_TO=${{ secrets.NEXT_PUBLIC_CONTACT_TO }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID=${{ secrets.GA_MEASUREMENT_ID }}
          NEXT_PUBLIC_PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
          NEXT_PUBLIC_PAY_DEBUG=false
          TRYON_API_BASE_URL=${{ secrets.TRYON_API_BASE_URL }}
          TRYON_API_KEY=${{ secrets.TRYON_API_KEY }}
          NEXT_TRYON_API_KEY=${{ secrets.TRYON_API_KEY }}
          RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
          RESEND_FROM=${{ secrets.RESEND_FROM }}
          EOF
          npm install
          npm run build

      # 3. BUILD FILE SERVER
      - name: Build File Server
        working-directory: ./file-server
        run: |
          npm install
          npm run build

      # 4. COPY ARTIFACTS TO EC2
      - name: Copy Build Folders to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # We only grab the compiled folders, package files, and server scripts
          source: "backend/dist/,backend/package.json,frontend/.next/,frontend/public/,frontend/package.json,frontend/next.config.js,file-server/dist/,file-server/package.json"
          target: "/home/ubuntu/production/"
          strip_components: 0 # Maintains the folder structure

      # 5. INSTALL PROD DEPENDENCIES AND START PM2
      - name: Start Applications on Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Load nvm so npm and pm2 are on PATH
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            # Backend Setup
            cd /home/ubuntu/production/backend
            npm install --omit=dev
            pm2 restart api || PORT=4000 pm2 start dist/index.js --name "api"

            # Frontend Setup
            cd /home/ubuntu/production/frontend
            npm install --omit=dev
            pm2 restart frontend || PORT=3000 pm2 start npm --name "frontend" -- start

            # File Server Setup
            cd /home/ubuntu/production/file-server
            npm install --omit=dev
            pm2 restart cdn || PORT=5000 pm2 start dist/index.js --name "cdn"

            pm2 save